palette:
  bg: "#0e0b1e"
  fg: "#e0d0ff"
  heading: "#ff2975"
  accent: "#00e5ff"
  code_bg: "#1a1333"
  muted: "#6644aa"
  hot_pink: "#ff2975"
  neon_cyan: "#00e5ff"
  neon_purple: "#bf3fff"
  warm_yellow: "#ffd319"

slide:
  bg: "palette:bg"
  fg: "palette:fg"
  margin:
    left: 4
    right: 4
    top: 2
    bottom: 1

styles:
  heading:
    fg: "palette:hot_pink"
    bold: true
  code:
    fg: "palette:neon_cyan"
    bg: "palette:code_bg"
    padding: 2
  blockquote:
    fg: "palette:neon_purple"
    italic: true

highlights:
  key:
    fg: "palette:warm_yellow"
    bold: true
  jargon:
    fg: "palette:neon_purple"
    italic: true
  definition:
    fg: "palette:neon_cyan"
  emphasis:
    fg: "palette:hot_pink"
    bold: true
  warning:
    fg: "#ff4444"
    bold: true
  quote:
    fg: "palette:accent"
    italic: true

footer:
  fg: "palette:muted"
